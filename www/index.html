<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImageVault</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<img src="img/logo.png" class="logo">

<h1>ImageVault</h1>

<p class="subtitulo">
Protege y recupera información oculta en imágenes
</p>

<button onclick="mostrarPantalla('ocultar')">
🔒 Ocultar mensaje
</button>

<button onclick="mostrarPantalla('leer')">
📸 Escanear imagen
</button>

<button onclick="mostrarPantalla('historial')">
🕘 Historial
</button>

</div>

<div id="ocultar" class="pantalla">

<h2>Ocultar mensaje</h2>

<input type="file" id="imagenOcultar" accept="image/*">

<textarea
id="mensaje"
placeholder="Escribe tu mensaje">
</textarea>

<button onclick="ocultarMensaje()">
Generar imagen protegida
</button>

<img id="preview" class="preview">

<button onclick="volverInicio()">
Volver
</button>

</div>

<div id="leer" class="pantalla">

<h2>Leer mensaje</h2>

<input type="file" id="imagenLeer" accept="image/*">

<button onclick="leerMensaje()">
Leer mensaje
</button>

<div id="resultado"></div>

<button onclick="volverInicio()">
Volver
</button>

</div>

<div id="historial" class="pantalla">

<h2>Historial</h2>

<p>Próximamente</p>

<button onclick="volverInicio()">
Volver
</button>

</div>

<canvas id="canvas" style="display:none;"></canvas>

<script src="js/app.js"></script>

</body>
</html>
