<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ImageVault</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <img src="img/logo.png" class="logo">

    <h1>ImageVault</h1>

    <p class="subtitulo">
        Protege y recupera información oculta en imágenes
    </p>

    <button onclick="mostrarPantalla('ocultar')">
        🔒 Ocultar mensaje
    </button>

    <button onclick="mostrarPantalla('leer')">
        📸 Escanear imagen
    </button>

    <button onclick="mostrarPantalla('historial')">
        🕘 Historial
    </button>

</div>

<div id="ocultar" class="pantalla">

    <h2>Ocultar mensaje</h2>

    <input type="file" id="imagen" accept="image/*">

    <textarea
    id="mensaje"
    placeholder="Escribe tu mensaje"></textarea>

    <input
    type="password"
    id="password"
    placeholder="Contraseña opcional">

    <button onclick="guardarMensaje()">
        Generar imagen protegida
    </button>

    <button onclick="volverInicio()">
        Volver
    </button>

</div>

<div id="leer" class="pantalla">

    <h2>Escanear imagen</h2>

    <input type="file" accept="image/*">

    <button>
        Leer mensaje
    </button>

    <button onclick="volverInicio()">
        Volver
    </button>

</div>

<div id="historial" class="pantalla">

    <h2>Historial</h2>

    <p>Próximamente</p>

    <button onclick="volverInicio()">
        Volver
    </button>

</div>

<script src="js/app.js"></script>

</body>
</html>
