<!DOCTYPE html><html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ImageVault</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body><div class="container"><h1>ImageVault</h1><button onclick="mostrarOcultar()">
Ocultar mensaje
</button><button onclick="mostrarLeer()">
Leer mensaje
</button><div id="ocultar" style="display:none"><h2>Ocultar mensaje</h2><input type="file" id="imagen"><textarea id="mensaje"
placeholder="Escribe tu mensaje">
</textarea><button onclick="guardarMensaje()">
Generar imagen
</button></div><div id="leer" style="display:none"><h2>Leer mensaje</h2><input type="file" id="imagenLeer"><button onclick="leerMensaje()">
Leer contenido
</button><p id="resultado"></p></div></div><script src="js/app.js"></script></body>
</html>
